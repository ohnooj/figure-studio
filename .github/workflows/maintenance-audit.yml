name: maintenance-audit

on:
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: app
      - name: File size audit
        run: make audit-size
      - name: Dead code audit
        run: cd app && npm run check:dead-code
      - name: Boundary audit
        run: cd app && npm run check:boundaries
      - name: Backend lint audit
        run: cd app && npm run check:backend:lint
      - name: Backend type audit
        run: cd app && npm run check:backend:types
