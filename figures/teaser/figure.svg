    .slot-frame { fill: #ebe6df; stroke: #c5b8aa; stroke-width: 2; stroke-dasharray: 10 7; }
    </style>
  </defs>
  <rect width="1400" height="760" fill="#ffffff" rx="24" id="auto-rect-0"/>

