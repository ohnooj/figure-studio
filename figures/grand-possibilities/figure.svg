    .panel-copy { font: 500 18px Georgia, serif; fill: #5a5148; }
    .slot-frame { fill: #ebe6df; stroke: #c5b8aa; stroke-width: 2; stroke-dasharray: 10 7; }
    .slot-placeholder { font: 500 18px Georgia, serif; fill: #71675b; }
    .annotation-stroke { fill: none; stroke: #d16e2b; stroke-width: 6; stroke-linecap: round; }
    .annotation-point { fill: #2b648d; stroke: #ffffff; stroke-width: 3; }
    .arrow-stroke { fill: none; stroke: #7a7167; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-head); }

    </style>
    <marker id="arrow-head" markerWidth="8" markerHeight="8" refX="6.2" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6.8,3 z" fill="#7a7167"/>
    </marker>
  </defs>
  <rect width="1400" height="960" fill="#ffffff" rx="24" id="auto-rect-0"/>

